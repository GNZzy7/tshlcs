  <script>
    let originalMatchMedia = window.matchMedia;

    window.matchMedia = (query) => {
      if (query === "(prefers-reduced-motion: reduce)") {
        return {
          matches: false,
          media: query,
          addEventListener() {},
          removeEventListener() {},
          addListener() {},
          removeListener() {},
          onchange: null,
          dispatchEvent() {
            return false;
          },
        };
      }

      return originalMatchMedia(query);
    };
  </script>
  <script type="module">
    import "https://esm.sh/number-flow";
    
    let participants = [];
    let eliminationCount = 3;
    
    function updateUser(user) {
      let userEl = document.getElementById(`user-${user.id}`);
      if (userEl) {
        let position = participants
          .slice(0, user.place)
          .map(p => document.getElementById(`user-${p.id}`)?.offsetHeight ?? 0)
          .reduce((a, b) => a + b, 0);
        
        userEl.querySelector("div").querySelector("img").src = user.avatar;
        userEl.querySelector("div").querySelector(".user-info").querySelector(".name-and-gains").querySelector("p").textContent = user.name;
        userEl.querySelector("div").querySelector(".user-info").querySelector(".name-and-gains").querySelector("number-flow").update(user.totalMessages - user.totalMessagesYesterday);
        userEl.querySelector("div").querySelector(".user-info").querySelector(".stats").querySelector(".total").update(user.totalMessages);
        userEl.querySelector("div").querySelector(".user-info").querySelector(".stats").querySelector(".xp").update(user.xpEnd - user.xpStart);
        userEl.querySelector(".messages").update(user.messages);
        
        if (user.place == 0) {
          userEl.style.backgroundColor = "#281d00";
          userEl.style.borderColor = "#403802";
        } else if (user.place >= participants.length - eliminationCount) {
          if (user.place == participants.length - eliminationCount) {
            document.querySelector(".elimination-text").style.top = position + "px";
            document.querySelector(".elimination-text").style.opacity = 1;
          }
          position += document.querySelector(".elimination-text").offsetHeight;
          userEl.style.backgroundColor = "#280000";
          userEl.style.borderColor = "#5a0808";
        } else {
          userEl.style.backgroundColor = "#1b1b1b";
          userEl.style.borderColor = "#363435";
        }
        
        userEl.style.top = position + "px";
        userEl.style.opacity = 1;
        return;
      }
      
      let userBox = document.createElement('div');
      userBox.className = 'user';
      userBox.id = `user-${user.id}`;
      userBox.style.backgroundColor = "#1b1b1b";
      
      let userTop = document.createElement('div');
      
      let avatar = document.createElement('img');
      avatar.src = user.avatar;
      
      let userInfo = document.createElement('div');
      userInfo.className = 'user-info';
      
      let nameAndGains = document.createElement('div');
      nameAndGains.className = 'name-and-gains';
      
      let name = document.createElement('p');
      name.className = 'name';
      name.textContent = user.name;
      
      let gains = document.createElement('number-flow');
      gains.className = 'gains';
      gains.transformTiming = {
        duration: 2000,
        easing: "ease",
      };
      gains.numberPrefix = "+";
      gains.numberSuffix = "/day";
      gains.update(user.totalMessages - user.totalMessagesYesterday);
      
      nameAndGains.appendChild(name);
      nameAndGains.appendChild(gains);
      
      let stats = document.createElement('div');
      stats.className = 'stats';
      
      let total = document.createElement('number-flow');
      total.className = 'total';
      total.transformTiming = {
        duration: 2000,
        easing: "ease",
      };
      total.numberPrefix = "TOTAL: ";
      total.update(user.totalMessages);
      
      let xp = document.createElement('number-flow');
      xp.className = 'xp';
      xp.transformTiming = {
        duration: 2000,
        easing: "ease",
      };
      xp.numberPrefix = "XP: ";
      xp.update(user.xpEnd - user.xpStart);
      
      stats.appendChild(total);
      stats.appendChild(xp);
      
      userInfo.appendChild(nameAndGains);
      userInfo.appendChild(stats);
      
      userTop.appendChild(avatar);
      userTop.appendChild(userInfo);
      
      let messages = document.createElement('number-flow');
      messages.className = 'messages';
      messages.transformTiming = {
        duration: 2000,
        easing: "ease",
      };
      messages.update(user.messages);
      
      userBox.appendChild(userTop);
      userBox.appendChild(messages);
      
      userBox.style.top = 0;
      userBox.style.opacity = 0; 
      
      document.querySelector(".users").append(userBox);
    }
    
    function formatDate(unix) {
      const date = new Date(unix);
      // Get date parts
      const d = date.getDate();
      const m = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(date);
      const y = date.getFullYear();
    
      // Add suffix (st, nd, rd, th)
      let suffix = 'th';
      if (d % 10 === 1 && d !== 11) suffix = 'st';
      else if (d % 10 === 2 && d !== 12) suffix = 'nd';
      else if (d % 10 === 3 && d !== 13) suffix = 'rd';
    
      // Get time parts
      let hr = date.getHours();
      const min = String(date.getMinutes()).padStart(2, '0');
      const ampm = hr >= 12 ? 'PM' : 'AM';
    
      // Convert to 12-hour format
      hr = hr % 12;
      hr = hr ? hr : 12; // the hour '0' should be '12'
    
      return `${m} ${d}${suffix}, ${hr}:${min}${ampm}`;
    }
    
    function data() {
      fetch("https://snozzyserver.onrender.com/api/tshlcs")
      .then(res => res.json())
      .then(data => {
        document.querySelector(".subtitle").textContent = `As it stands - ${formatDate(data.UPDATED)}`;
        participants = data.participants.filter(p => !p.out || !p.eliminated);
        for (let i = 0; i < participants.length; i++) {
          updateUser({
            ...participants[i],
            place: i
          });
        }
      });
    }
    data();
    setInterval(data, 2000);
  </script>
